<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Plan">
<title>Meal Plan</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--s1:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;
  --accent:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--yellow:#ffd60a;
  --t1:#ffffff;--t2:rgba(235,235,245,0.8);--t3:rgba(235,235,245,0.55);
  --tab:49px;
  --spring:cubic-bezier(0.32,0.72,0,1);
  --spring-bounce:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:cubic-bezier(0.25,0.46,0.45,0.94);
}
html,body{height:100%;background:var(--bg);color:var(--t1);
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  overscroll-behavior:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#app{height:100%;display:flex;flex-direction:column}

/* Loading overlay */
#loader{position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.4s var(--ease-out)}
#loader.fade-out{opacity:0;pointer-events:none}
.loader-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
  display:inline-block;margin:0 4px;
  animation:loaderPulse 1.2s var(--ease-out) infinite}
.loader-dot:nth-child(2){animation-delay:.15s}
.loader-dot:nth-child(3){animation-delay:.3s}
@keyframes loaderPulse{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.section{display:none;flex:1;overflow-y:auto;
  padding:calc(env(safe-area-inset-top,44px) + 16px) 16px calc(var(--tab) + env(safe-area-inset-bottom,0px) + 20px);
  -webkit-overflow-scrolling:touch;gap:10px;flex-direction:column}
.section.active{display:flex;animation:sectionIn 0.28s var(--ease-out) both}
@keyframes sectionIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

#version-badge{position:fixed;bottom:calc(env(safe-area-inset-bottom,34px) + var(--tab) + 6px);left:10px;
  font-size:10px;color:var(--t3);pointer-events:none;z-index:99;letter-spacing:0.02em}

/* Tab bar */
#tab-bar{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tab) + env(safe-area-inset-bottom,34px));
  padding-bottom:env(safe-area-inset-bottom,34px);
  background:rgba(18,18,20,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:0.5px solid rgba(255,255,255,0.12);
  display:flex;align-items:flex-start;padding-top:8px;z-index:100}
@media(display-mode:standalone){
  #tab-bar{background:rgba(12,12,14,0.98)}
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--t3);font-size:10px;font-family:inherit;
  cursor:pointer;padding:4px 0;transition:color 0.2s var(--ease-out);
  -webkit-tap-highlight-color:transparent}
.tab.active{color:var(--accent)}
.tab svg{width:24px;height:24px;fill:currentColor;display:block;
  transition:transform 0.35s var(--spring-bounce)}
.tab.active svg{transform:scale(1.12)}
.tab:active svg{transform:scale(0.9)}

/* Section title */
.section-title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}

/* Cal header */
#cal-header{display:flex;align-items:center;justify-content:space-between}
#cal-range{font-size:14px;color:var(--t3);font-weight:500}
.icon-btn{background:var(--s2);border:none;color:var(--t1);
  width:32px;height:32px;border-radius:50%;font-size:16px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform 0.15s var(--ease-out),background 0.15s}
.icon-btn:active{transform:scale(0.88);background:var(--s3)}

/* Day cards */
.day-card{background:var(--s1);border-radius:16px;padding:13px 14px;
  display:flex;align-items:center;gap:11px;cursor:pointer;position:relative;
  border:1.5px solid transparent;
  transition:transform 0.15s var(--ease-out),opacity 0.15s}
.day-card:active{transform:scale(0.97);opacity:0.85}
.day-card.is-today{background:var(--s2);border-color:var(--accent)}
.day-card.is-yesterday{opacity:.5}
.day-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-stovetop{background:var(--accent)}
.dot-oven{background:var(--orange)}
.dot-crockpot{background:var(--green)}
.dot-none{background:var(--s3)}
.day-date{display:flex;flex-direction:column;align-items:center;min-width:34px}
.day-abbr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.day-num{font-size:20px;font-weight:700;line-height:1.1}
.day-info{flex:1;min-width:0}
.day-meal{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-sub{font-size:12px;color:var(--t3);margin-top:2px}
.day-badges{display:flex;flex-direction:column;gap:4px;flex-shrink:0;align-items:flex-end}
.badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;letter-spacing:.3px;white-space:nowrap}
.badge-shop{background:var(--yellow);color:#000}
.badge-sams{background:var(--green);color:#000}
.badge-prep{background:var(--green);color:#000}
.badge-prepped{background:var(--s3);color:var(--t2)}
.badge-rice{background:rgba(255,159,10,.2);color:var(--orange)}

/* Meals list */
.meal-item{background:var(--s1);border-radius:14px;padding:11px 13px;
  display:flex;align-items:center;gap:9px;
  transition:transform 0.15s var(--ease-out),opacity 0.2s,box-shadow 0.2s}
.meal-item.muted{opacity:.35}
.meal-item.dragging{opacity:.92;background:var(--s2);transform:scale(1.03);
  box-shadow:0 12px 32px rgba(0,0,0,.5);border-radius:16px;z-index:10}
.drag-handle{color:var(--t3);font-size:20px;cursor:grab;padding:4px 4px;
  touch-action:none;user-select:none;-webkit-user-select:none;line-height:1}
.meal-num{font-size:12px;color:var(--t3);min-width:20px;text-align:right;font-variant-numeric:tabular-nums}
.mbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0}
.mbadge-stovetop{background:rgba(10,132,255,.18);color:var(--accent)}
.mbadge-oven{background:rgba(255,159,10,.18);color:var(--orange)}
.mbadge-crockpot{background:rgba(48,209,88,.18);color:var(--green)}
.meal-info{flex:1;min-width:0;cursor:pointer}
.meal-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-macros{font-size:11px;color:var(--t3);margin-top:1px}
.meal-acts{display:flex;gap:5px;flex-shrink:0}
.act-btn{background:var(--s2);border:none;color:var(--t2);
  width:32px;height:32px;border-radius:9px;font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform 0.12s var(--ease-out),background 0.12s}
.act-btn:active{transform:scale(0.87)}
.act-btn.muted-on{color:var(--orange)}
.act-btn.del{color:var(--red)}
#add-recipe-btn{width:100%;background:none;border:1.5px dashed var(--s3);
  color:var(--accent);font-size:15px;font-weight:600;font-family:inherit;
  padding:14px;border-radius:14px;cursor:pointer;margin-top:2px;
  transition:transform 0.15s var(--ease-out),opacity 0.15s}
#add-recipe-btn:active{transform:scale(0.97);opacity:.7}

/* Shopping */
.pill-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;flex-shrink:0;min-height:40px;align-items:center}
.pill-tabs::-webkit-scrollbar{display:none}
.pill-tab{background:var(--s2);border:none;color:var(--t2);font-size:14px;font-weight:600;
  font-family:inherit;padding:8px 16px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:background 0.2s var(--ease-out),color 0.2s,transform 0.12s var(--ease-out)}
.pill-tab:active{transform:scale(0.93)}
.pill-tab.active{background:var(--accent);color:#fff}
.store-toggle{display:flex;background:var(--s2);border-radius:10px;padding:3px}
.store-btn{flex:1;background:none;border:none;color:var(--t3);
  font-size:14px;font-weight:600;font-family:inherit;padding:8px;border-radius:8px;cursor:pointer;
  transition:background 0.2s var(--ease-out),color 0.2s}
.store-btn.active{background:var(--s3);color:var(--t1)}
.shop-cat-title{font-size:11px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;padding:12px 0 6px}
.shop-item{display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:0.5px solid rgba(255,255,255,0.07);cursor:pointer;
  transition:opacity 0.2s}
.shop-item:last-child{border-bottom:none}
.shop-item:active{opacity:.6}
.shop-chk{width:24px;height:24px;border:2px solid var(--s3);border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.25s var(--spring-bounce)}
.shop-item.checked .shop-chk{background:var(--accent);border-color:var(--accent);transform:scale(1.0)}
.shop-item.just-checked .shop-chk{transform:scale(1.25)}
.shop-item.checked .shop-chk::after{content:'';width:5px;height:9px;
  border:2px solid #fff;border-top:none;border-left:none;
  transform:rotate(45deg) translateY(-1px)}
.shop-item-text{flex:1;font-size:15px;line-height:1.3;transition:color 0.2s,opacity 0.2s}
.shop-item.checked .shop-item-text{color:var(--t3);text-decoration:line-through;opacity:.6}
.shop-meal-ct{font-size:11px;color:var(--t3);flex-shrink:0}
#reset-shop-btn{width:100%;background:none;border:0.5px solid var(--s3);
  color:var(--t3);font-size:15px;font-family:inherit;
  padding:14px;border-radius:14px;cursor:pointer;margin-top:16px;
  transition:transform 0.15s var(--ease-out),opacity 0.15s}
#reset-shop-btn:active{transform:scale(0.97);opacity:.7}

/* Modals */
.modal{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;
  pointer-events:none;visibility:hidden}
.modal.visible{pointer-events:auto;visibility:visible}
.modal-bd{position:absolute;inset:0;background:rgba(0,0,0,0);
  transition:background 0.3s var(--ease-out)}
.modal.open .modal-bd{background:rgba(0,0,0,.6)}
.modal-sheet{position:relative;width:100%;max-height:88vh;
  background:var(--s1);border-radius:22px 22px 0 0;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform 0.42s var(--spring)}
.modal.open .modal-sheet{transform:translateY(0)}
.modal-handle{height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  touch-action:none;cursor:grab;border-radius:22px 22px 0 0}
.modal-pill{width:36px;height:4px;background:var(--s3);border-radius:2px;pointer-events:none}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 20px;
  padding-bottom:max(28px,calc(env(safe-area-inset-bottom,0px) + 28px))}
.modal-close{position:absolute;top:20px;right:16px;background:rgba(60,60,67,0.6);
  border:none;color:var(--t1);width:30px;height:30px;border-radius:50%;
  font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;transition:transform 0.15s var(--ease-out),opacity 0.15s}
.modal-close:active{transform:scale(0.87);opacity:.7}

/* Recipe modal content */
.rm-title{font-size:22px;font-weight:700;margin-bottom:8px;padding-right:44px;line-height:1.25}
.rm-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.rm-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.macro-box{background:var(--s2);border-radius:12px;padding:10px 8px;text-align:center}
.macro-val{font-size:18px;font-weight:700}
.macro-lbl{font-size:10px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.rm-sec{font-size:11px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;margin:18px 0 8px}
.rm-ing{font-size:15px;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.07);color:var(--t2)}
.rm-step{font-size:15px;padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,0.07);
  line-height:1.5;display:flex;gap:12px;color:var(--t2)}
.step-n{font-weight:700;color:var(--accent);flex-shrink:0;width:18px}
.bs-box{background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.2);
  border-radius:14px;padding:14px;margin-top:18px;font-size:14px;color:var(--t2);line-height:1.6}
.bs-lbl{font-size:11px;font-weight:700;color:var(--green);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* Add recipe form */
.form-group{margin-bottom:14px}
.form-lbl{font-size:12px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input,.form-textarea,.form-select{
  width:100%;background:var(--s2);border:1px solid var(--s3);
  border-radius:12px;color:var(--t1);font-size:16px;font-family:inherit;padding:12px 14px;
  transition:border-color 0.2s}
.form-textarea{min-height:90px;resize:vertical}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Mini calendar */
.mini-cal{background:var(--s2);border-radius:14px;overflow:hidden}
.mini-cal-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:0.5px solid rgba(255,255,255,0.08)}
.mini-cal-title{font-size:16px;font-weight:700}
.mini-nav{background:none;border:none;color:var(--accent);
  font-size:20px;cursor:pointer;padding:4px 12px;
  transition:transform 0.15s var(--ease-out)}
.mini-nav:active{transform:scale(0.85)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:6px 6px 10px}
.mini-dow{font-size:11px;font-weight:700;color:var(--t3);padding:6px 0;text-transform:uppercase}
.mini-day{padding:8px 0;font-size:14px;cursor:pointer;border-radius:8px;margin:1px;
  transition:background 0.15s,transform 0.12s var(--spring-bounce)}
.mini-day:not(.disabled):not(.empty):active{transform:scale(0.85)}
.mini-day.disabled{color:var(--t3);opacity:.25;cursor:default}
.mini-day.selected{background:var(--accent);color:#fff;font-weight:700}
.mini-day.empty{cursor:default}

.save-btn{width:100%;background:var(--accent);border:none;color:#fff;
  font-size:17px;font-weight:600;font-family:inherit;
  padding:16px;border-radius:14px;cursor:pointer;margin-top:14px;
  transition:transform 0.15s var(--ease-out),opacity 0.15s}
.save-btn:active:not(:disabled){transform:scale(0.97);opacity:.88}
.save-btn:disabled{opacity:.35;cursor:default}
.step-hint{font-size:13px;color:var(--t3);margin-bottom:14px}
</style>
</head>
<body>
<div id="loader"><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>
<div id="app">

<section id="sec-calendar" class="section active">
  <div id="cal-header">
    <span class="section-title" id="cal-title">Calendar</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="cal-range"></span>
      <button class="icon-btn" id="cal-prev" onclick="calNav(-1)">&#8249;</button>
      <button class="icon-btn" id="cal-next" onclick="calNav(1)">&#8250;</button>
    </div>
  </div>
  <div id="cal-cards"></div>
</section>

<section id="sec-meals" class="section">
  <span class="section-title">Meals</span>
  <div id="meals-list"></div>
  <button id="add-recipe-btn" onclick="openAddModal()">+ Add Recipe</button>
  <button id="add-recipe-btn" onclick="document.getElementById('import-json-input').click()" style="margin-top:0">⬆ Import Recipe JSON</button>
  <input type="file" id="import-json-input" accept=".json" style="display:none" onchange="importRecipeJSON(this)">
</section>

<section id="sec-shopping" class="section" style="padding:0;gap:0;overflow:hidden">
  <div id="shop-header" style="flex-shrink:0;padding:calc(env(safe-area-inset-top,44px) + 16px) 16px 12px;background:var(--bg);z-index:10;display:flex;flex-direction:column;gap:10px">
    <span class="section-title">Shopping</span>
    <div id="shop-tabs" class="pill-tabs"></div>
    <div id="shop-store-toggle" class="store-toggle"></div>
  </div>
  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px calc(var(--tab) + env(safe-area-inset-bottom,0px) + 20px)">
    <div id="shop-items"></div>
    <button id="reset-shop-btn" onclick="resetShopList()">Reset List</button>
  </div>
</section>

</div>

<nav id="tab-bar">
  <button class="tab active" data-sec="sec-calendar" onclick="showSection('sec-calendar')">
    <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.9 4 3 4.9 3 6v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zm0-13H5V6h14v1z"/></svg>
    <span>Calendar</span>
  </button>
  <button class="tab" data-sec="sec-meals" onclick="showSection('sec-meals')">
    <svg viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-8-15.03-8-15.03 0h15.03zM1.02 17h15v2h-15z"/></svg>
    <span>Meals</span>
  </button>
  <button class="tab" data-sec="sec-shopping" onclick="showSection('sec-shopping')">
    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59L5.25 14c-.16.28-.25.61-.25.96C5 16.1 5.9 17 7 17h14v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.54 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    <span>Shopping</span>
  </button>
</nav>
<div id="version-badge">v1.3</div>

<div id="modal-recipe" class="modal hidden">
  <div class="modal-bd" onclick="closeModal('modal-recipe')"></div>
  <div class="modal-sheet">
    <div class="modal-handle"><div class="modal-pill"></div></div>
    <button class="modal-close" onclick="closeModal('modal-recipe')">&#10005;</button>
    <div class="modal-body">
      <div id="modal-recipe-body"></div>
    </div>
  </div>
</div>

<div id="modal-add" class="modal hidden">
  <div class="modal-bd" onclick="closeModal('modal-add')"></div>
  <div class="modal-sheet">
    <div class="modal-handle"><div class="modal-pill"></div></div>
    <button class="modal-close" onclick="closeModal('modal-add')">&#10005;</button>
    <div class="modal-body">
      <div id="modal-add-body"></div>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const ROTATION_START = new Date(2026,5,15);
const FIRST_BULK_SUNDAY = new Date(2026,5,21);
const BULK_INTERVAL = 14;

// ── MEALS DATA ─────────────────────────────────────────────
const MEALS = {
'honey-garlic-chicken-skillet':{name:'Honey Garlic Chicken Skillet',method:'stovetop',prepTime:10,cookTime:25,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','2 tbsp cornstarch','1 tsp salt','½ tsp black pepper','1 tbsp olive oil','2 tbsp unsalted butter','6 cloves garlic, minced','⅓ cup chicken broth','⅓ cup honey','1½ tbsp soy sauce','1 tbsp rice vinegar','1½ cups dry brown rice'],steps:['Cook rice: combine 1½ cups brown rice and 3 cups water. Bring to boil, reduce to low, cover tightly, cook 40–45 min.','Pat chicken dry with paper towels. Toss with cornstarch, salt, and pepper.','Whisk broth, honey, soy sauce, and rice vinegar together. Set aside.','Heat olive oil in large skillet over medium-high. Add chicken smooth side down. Cook 5–6 min without moving.','Flip chicken. Cook 4–5 more min. Move to edges.','Add butter to center. Once melted add garlic, stir 60 sec.','Pour sauce over everything. Simmer on medium-low, spooning sauce over chicken every min for 4–5 min until thickened and chicken hits 165°F.','Serve over rice with all pan sauce.'],macros:{calories:680,protein:72,carbs:52,fat:22},estimatedCost:12,bloodSugarNote:"High protein + fat slows glucose absorption from honey and rice. Don't skip rice — complex carbs + protein prevents crashes better than protein alone."},
'teriyaki-chicken-bowl':{name:'Teriyaki Chicken Bowl',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','⅓ cup soy sauce','4 tbsp brown sugar','1 tbsp water','2 cloves garlic, minced','1½ tsp fresh ginger, grated','2½ tbsp cooking oil, divided','1½ cups dry brown rice','3 cups broccoli florets'],steps:['Cook rice: 1½ cups rice + 3 cups water, boil, cover, simmer low 40–45 min.','Whisk soy sauce, brown sugar, water, garlic, ginger, 1 tbsp oil. Marinate chicken 30 min minimum.','Heat 1½ tbsp oil over medium. Cook chicken 6–8 min per side until 165°F and caramelized.','Steam broccoli in microwave-safe bowl with 2 tbsp water, covered, 3–4 min.','Rest chicken 5 min then slice.','Serve over rice with broccoli.'],macros:{calories:640,protein:70,carbs:48,fat:18},estimatedCost:12,bloodSugarNote:'Marinate overnight for best flavor. Eat protein first before rice. Brown sugar per serving is about 1 tbsp total split four ways.'},
'greek-chicken-bowl':{name:'Greek Chicken Bowl',method:'stovetop',prepTime:15,cookTime:20,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','3 tbsp olive oil (marinade)','4 tbsp fresh lemon juice (about 2 lemons)','1½ tsp lemon zest','4 cloves garlic, minced','1 tsp dried oregano','½ tsp dried thyme','1 tsp salt','½ tsp black pepper','1½ cups dry brown rice','1 medium cucumber, diced','½ cup crumbled feta cheese','2 tbsp fresh parsley, chopped','1 tbsp olive oil (cooking)'],steps:['Cook rice: 1½ cups rice + 3 cups water, boil, cover, simmer low 40–45 min.','Whisk 3 tbsp oil, lemon juice, zest, garlic, oregano, thyme, salt, pepper. Marinate chicken 30 min–8 hrs.','Heat 1 tbsp oil in heavy skillet over medium-high. Cook chicken 6–7 min per side until 165°F.','Rest 5 min, then slice into strips.','Build bowls: rice, chicken, cucumber, feta, parsley, extra lemon.'],macros:{calories:620,protein:71,carbs:44,fat:20},estimatedCost:13,bloodSugarNote:'Zero sugar in marinade. Feta fat slows glucose uptake from rice. Cucumber adds volume with almost zero carbs.'},
'chicken-black-bean-skillet':{name:'Chicken and Black Bean Skillet',method:'stovetop',prepTime:10,cookTime:25,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs, cut into 1-inch pieces','2 cans (15 oz each) black beans, drained and rinsed','1½ cups dry brown rice','1 tsp cumin','1 tsp smoked paprika','½ tsp garlic powder','1 tsp salt','4 cloves garlic, minced','1 cup chicken broth','Juice of 2 limes','¼ cup fresh cilantro, chopped','1 tbsp olive oil','1 cup shredded cheddar cheese'],steps:['Cook rice: 1½ cups rice + 3 cups water, boil, cover, simmer low 40–45 min.','Mix spices. Season chicken pieces.','Heat oil over medium-high. Sear chicken 4–5 min without stirring, flip, cook 3–4 more min.','Add garlic, stir 60 sec.','Add beans and broth. Simmer uncovered 5–7 min until broth reduces by half.','Squeeze lime, add cilantro.','Serve over rice topped with cheddar.'],macros:{calories:690,protein:75,carbs:58,fat:18},estimatedCost:11,bloodSugarNote:'Black beans dramatically blunt the glycemic response of rice. One of the best blood sugar meals on the list.'},
'cilantro-lime-chicken-bowl':{name:'Cilantro Lime Chicken Bowl',method:'stovetop',prepTime:15,cookTime:20,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','Juice of 3 limes, divided','Zest of 1 lime','4 cloves garlic, minced','1 tsp cumin','1 tsp salt','1 tbsp olive oil','1½ cups dry brown rice','2 cans (15 oz each) black beans, drained','½ cup fresh cilantro, roughly chopped, divided','2 avocados, sliced','½ cup sour cream'],steps:['Make cilantro lime rice: cook 1½ cups rice with 3 cups water, juice of 1 lime, lime zest, ½ tsp salt. When done, stir in half the cilantro.','Combine juice of 2 limes, garlic, cumin, salt, oil. Marinate chicken 20–30 min.','Cook chicken over medium-high 6–7 min per side until 165°F.','Rest 5 min then slice.','Warm black beans with pinch of cumin.','Build bowls: rice, beans, chicken, avocado, remaining cilantro, sour cream.'],macros:{calories:700,protein:73,carbs:60,fat:21},estimatedCost:12,bloodSugarNote:"Don't skip the avocado — healthy fat slows gastric emptying significantly."},
'sesame-ginger-chicken':{name:'Sesame Ginger Chicken',method:'stovetop',prepTime:10,cookTime:25,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs, cut into 1-inch pieces','¼ cup soy sauce','2 tbsp sesame oil','2 tbsp rice vinegar','2 tbsp honey','1½ tbsp fresh ginger, grated','4 cloves garlic, minced','1 tbsp cornstarch','¼ cup water','1 tbsp cooking oil','3 cups broccoli florets','1½ cups dry brown rice','2 tbsp sesame seeds','3 green onions, green parts only, sliced'],steps:['Cook rice: 1½ cups rice + 3 cups water, boil, cover, simmer low 40–45 min.','Whisk sauce: soy sauce, sesame oil, vinegar, honey, ginger, garlic, cornstarch, water.','Heat wok over HIGH until smoking. Add oil. Add chicken in single layer, sear 3–4 min without moving. Stir, cook 2–3 more min. Remove.','Add broccoli to wok, stir-fry 3–4 min on high.','Return chicken. Pour sauce. Toss 2–3 min until sauce thickens.','Serve over rice. Top with sesame seeds and green onion.'],macros:{calories:660,protein:70,carbs:52,fat:22},estimatedCost:12,bloodSugarNote:'Broccoli adds soluble fiber slowing glucose absorption. Honey per serving is about ½ tbsp — minimal with this much protein.'},
'chicken-stir-fry':{name:'Chicken Stir Fry',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs, cut into 1-inch pieces','3 cups broccoli florets','2 cups snap peas or green beans, trimmed','4 cloves garlic, minced','1 tbsp fresh ginger, grated','3 tbsp soy sauce','1 tbsp oyster sauce','1 tbsp cornstarch','½ cup chicken broth','1 tsp sesame oil','1 tsp sugar','1½ tbsp cooking oil','1½ cups dry brown rice'],steps:['Cook rice: 1½ cups rice + 3 cups water, boil, cover, simmer low 40–45 min.','Whisk sauce: soy sauce, oyster sauce, cornstarch, broth, sesame oil, sugar.','Heat wok over HIGH until very hot. Add 1 tbsp oil. Add chicken, sear 3–4 min, stir, cook 2 more min. Remove.','Add remaining oil. Stir-fry broccoli and snap peas 3–4 min.','Add garlic and ginger, stir 30 sec.','Return chicken, pour sauce. Toss 2 min until thickened.','Serve immediately over rice.'],macros:{calories:620,protein:70,carbs:45,fat:19},estimatedCost:11,bloodSugarNote:'High vegetable-to-rice ratio. Eat protein and vegetables first, then rice for best blood sugar.'},
'chicken-rice-skillet':{name:'Chicken and Rice Skillet',method:'stovetop',prepTime:10,cookTime:35,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','1½ cups long-grain white rice','3 cups chicken broth','1 cup water','5 cloves garlic, minced','1 tsp Italian seasoning','1 tsp garlic powder','1 tsp salt','½ tsp black pepper','½ cup freshly grated parmesan','2 tbsp butter','1 tbsp olive oil'],steps:['Season chicken with garlic powder, salt, pepper, half the Italian seasoning.','Heat oil over medium-high. Sear chicken 5–6 min per side until golden. Remove — not fully cooked yet.','Reduce heat to medium. Melt butter, add garlic, stir 60 sec.','Add rice, toast 2 min. Pour in broth and water, scrape up bits. Add remaining seasoning.','Nestle chicken back in. Bring to boil.','Cover, cook on low 20 min. Rest covered 5 more min.','Top with parmesan. Serve from pan.'],macros:{calories:690,protein:74,carbs:52,fat:22},estimatedCost:12,bloodSugarNote:'Chicken protein and parmesan fat buffer white rice glycemic response. High protein-to-carb ratio is protective.'},
'chipotle-chicken-bowl':{name:'Smoky Chipotle Chicken Bowl',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','1 tbsp smoked paprika','1 tsp cumin','1 tsp garlic powder','1 tsp dried oregano','1 tsp salt','½ tsp black pepper','1 tbsp olive oil','1½ cups dry brown rice','2 cans (15 oz each) black beans, drained','Juice of 1 lime','1 cup shredded cheddar or Monterey Jack','½ cup sour cream','Fresh cilantro'],steps:['Cook rice with lime juice stirred in when done.','Mix all spices. Coat chicken thighs generously — press spices in.','Heat oil in cast iron over medium-high until smoking. Cook chicken 6–7 min per side until deep golden and 165°F.','Rest 5 min, slice.','Warm beans with pinch of cumin and salt.','Build bowls: rice, beans, chicken, cheese, sour cream, cilantro.'],macros:{calories:730,protein:77,carbs:62,fat:22},estimatedCost:11,bloodSugarNote:'Best blood sugar meal on the list. Protein + fat (sour cream, cheese) + fiber (beans) working together is very effective.'},
'ground-beef-rice-bowl':{name:'Ground Beef Rice Bowl',method:'stovetop',prepTime:5,cookTime:25,servings:4,ingredients:['2 lbs 80/20 ground beef','1½ cups dry brown rice','2 cans (15 oz each) black beans, drained','4 cloves garlic, minced','2 tbsp soy sauce','1 tbsp Worcestershire sauce','1 tsp smoked paprika','1 tsp cumin','1 tsp salt','1 cup shredded cheddar','½ cup sour cream','Fresh cilantro (optional)'],steps:['Cook rice: 1½ cups rice + 3 cups water, boil, cover, simmer low 40–45 min.','Brown beef over medium-high, breaking into crumbles, 8–10 min. Drain most fat.','Add garlic, stir 60 sec.','Add soy sauce, Worcestershire, spices. Cook 2 min.','Add beans, heat through 3 min.','Serve over rice. Top with cheddar and sour cream.'],macros:{calories:710,protein:65,carbs:58,fat:25},estimatedCost:11,bloodSugarNote:'Ground beef is zero carbs. Beans are complex carbs with fiber. Sour cream fat further slows digestion.'},
'beef-potato-skillet':{name:'Beef and Potato Skillet',method:'stovetop',prepTime:10,cookTime:30,servings:4,ingredients:['2 lbs 80/20 ground beef','1.5 lbs Yukon Gold potatoes, diced ½-inch','4 cloves garlic, minced','1 tsp smoked paprika','1 tsp garlic powder','1 tsp salt','½ tsp black pepper','1 tbsp olive oil','1½ cups shredded cheddar cheese','4 tbsp sour cream'],steps:['Cook potatoes in skillet with 1 cup water covered 8–10 min until fork-tender. Drain.','Push potatoes aside. Add olive oil, brown beef 8–10 min. Drain most fat.','Season beef. Add garlic, stir 60 sec.','Combine beef and potatoes, cook together 3–4 min.','Top with cheddar, cover 2 min to melt.','Serve with sour cream.'],macros:{calories:680,protein:55,carbs:30,fat:37},estimatedCost:11,bloodSugarNote:'Yukon Golds have lower GI than Russets. Cheese and beef fat buffer the glycemic response. Very filling.'},
'beef-taco-bowl':{name:'Beef Taco Bowl',method:'stovetop',prepTime:5,cookTime:25,servings:4,ingredients:['2 lbs 80/20 ground beef','1½ cups dry brown rice','2 cans (15 oz each) black or pinto beans, drained','4 cloves garlic, minced','2 tbsp chili powder','1 tsp cumin','1 tsp garlic powder','1 tsp smoked paprika','1 tsp salt','¼ tsp cayenne','½ cup water','1 cup shredded Mexican cheese blend','½ cup sour cream','Juice of 2 limes','Fresh cilantro'],steps:['Cook rice.','Brown beef, drain most fat.','Add garlic, stir 60 sec.','Add spices, water. Simmer 3–4 min.','Add beans, heat 3 min.','Build bowls: rice, beef+beans, cheese, sour cream, lime, cilantro.'],macros:{calories:720,protein:67,carbs:62,fat:26},estimatedCost:11,bloodSugarNote:'Classic taco bowl: protein from beef, fiber from beans, fat from cheese and sour cream all working together.'},
'sesame-ginger-beef':{name:'Sesame Ginger Beef Bowl',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['2 lbs 80/20 ground beef','3 cups broccoli florets','¼ cup soy sauce','2 tbsp sesame oil','2 tbsp rice vinegar','1 tbsp honey','1½ tbsp fresh ginger, grated','4 cloves garlic, minced','1 tbsp cornstarch','¼ cup water','1 tbsp cooking oil','1½ cups dry brown rice','2 tbsp sesame seeds','Green onion tops, sliced'],steps:['Cook rice.','Whisk sauce: soy sauce, sesame oil, vinegar, honey, ginger, garlic, cornstarch, water.','Heat oil over high. Spread beef thin, cook 4–5 min without stirring. Break up, cook 3 more min. Drain, leave 1 tbsp fat.','Push beef aside. Add broccoli, cook 3–4 min.','Pour sauce over everything. Toss 2–3 min until thick.','Serve over rice. Top with sesame seeds and green onion.'],macros:{calories:680,protein:60,carbs:50,fat:26},estimatedCost:11,bloodSugarNote:'Broccoli adds fiber. Honey is ¼ tbsp per serving — not significant with this much protein and fat.'},
'turkey-taco-bowl':{name:'Turkey Taco Bowl',method:'stovetop',prepTime:5,cookTime:25,servings:4,ingredients:['2 lbs 93/7 ground turkey','1½ cups dry brown rice','2 cans (15 oz each) black beans, drained','4 cloves garlic, minced','2 tbsp chili powder','1 tsp cumin','1 tsp garlic powder','1 tsp smoked paprika','1 tsp salt','½ cup chicken broth','1 cup shredded Mexican cheese blend','½ cup sour cream','Juice of 2 limes','Fresh cilantro'],steps:['Cook rice.','Cook turkey over medium-high 8–10 min stirring frequently. Drain.','Add garlic, stir 60 sec. Add spices and broth, simmer 3–4 min.','Add beans, heat 3 min.','Build bowls: rice, turkey+beans, cheese, sour cream, lime, cilantro.'],macros:{calories:680,protein:72,carbs:60,fat:18},estimatedCost:12,bloodSugarNote:'93/7 turkey is one of the leanest proteins available — more protein per calorie than ground beef.'},
'turkey-rice-skillet':{name:'Turkey and Rice Skillet',method:'stovetop',prepTime:10,cookTime:35,servings:4,ingredients:['2 lbs 93/7 ground turkey','1½ cups long-grain white rice','3½ cups chicken broth','5 cloves garlic, minced','1 tsp Italian seasoning','1 tsp garlic powder','1 tsp salt','½ tsp black pepper','¾ cup freshly grated parmesan','2 tbsp butter','¼ cup fresh parsley, chopped'],steps:['Brown turkey over medium-high 8–10 min. Season. Drain excess liquid.','Add butter, garlic, stir 60 sec.','Add rice, toast 2 min.','Pour in broth, add Italian seasoning. Bring to boil.','Cover, cook on low 18–20 min. Rest 5 min.','Stir in parmesan. Garnish with parsley.'],macros:{calories:650,protein:70,carbs:48,fat:20},estimatedCost:12,bloodSugarNote:'Parmesan fat buffers white rice glycemic response. Turkey is pure lean protein. Well-balanced.'},
'turkey-potato-skillet':{name:'Ground Turkey and Potato Skillet',method:'stovetop',prepTime:10,cookTime:30,servings:4,ingredients:['2 lbs 93/7 ground turkey','1.5 lbs Yukon Gold potatoes, diced ½-inch','5 cloves garlic, minced','1 tsp smoked paprika','1 tsp garlic powder','1 tsp Italian seasoning','1 tsp salt','½ tsp black pepper','1 tbsp olive oil','1½ cups shredded cheddar','4 tbsp sour cream'],steps:['Steam potatoes with 1 cup water covered 8–10 min. Drain.','Add olive oil, cook turkey 8–10 min. Season with spices.','Add garlic, stir 60 sec.','Add potatoes back, cook together 3–4 min.','Top with cheddar, cover to melt.','Serve with sour cream.'],macros:{calories:640,protein:67,carbs:28,fat:28},estimatedCost:11,bloodSugarNote:'Lower carb than rice-based meals. Potatoes + lean protein + cheese is solid for reactive hypoglycemia.'},
'sausage-potato-hash':{name:'Sausage and Potato Hash',method:'stovetop',prepTime:10,cookTime:30,servings:4,ingredients:['1.5 lbs smoked beef or pork sausage, sliced ½-inch coins','1.5 lbs Yukon Gold potatoes, diced ½-inch','4 cloves garlic, minced','1 tsp smoked paprika','1 tsp garlic powder','1 tsp salt','8 large eggs','1 tbsp olive oil','½ cup shredded cheddar','Fresh parsley'],steps:['Cook potatoes with 1 cup water covered 8–10 min. Drain.','Crisp potatoes in olive oil 4–5 min per side. Season. Add sausage coins, cook 3–4 min.','Add garlic, stir 60 sec.','Make 4 wells, crack 2 eggs per well. Cover, cook 4–5 min.','Top with cheddar, melt 1 min.','Garnish with parsley.'],macros:{calories:680,protein:58,carbs:28,fat:40},estimatedCost:12,bloodSugarNote:'Eggs are zero-carb protein + fat. Most blood sugar stable meal on the list. Very slow sustained digestion.'},
'salmon-rice-bowl':{name:'Pan-Seared Salmon Rice Bowl',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['1.5 lbs salmon fillets, 4 portions (~6 oz each), skin-off','1½ cups dry brown rice','2 avocados, sliced','1 tbsp cooking oil','1 tsp salt','½ tsp black pepper','3 tbsp soy sauce','1 tbsp sesame oil','1 tbsp rice vinegar','2 tsp honey','2 cloves garlic, minced','1 tsp fresh ginger, grated','2 tbsp sesame seeds','Green onion tops, sliced'],steps:['Cook rice.','Whisk sauce: soy sauce, sesame oil, vinegar, honey, garlic, ginger.','Pat salmon completely dry. Season with salt and pepper.','Heat oil in non-stick over medium-high. Sear salmon presentation-side down 4–5 min until a crust forms.','Flip carefully. Cook 2–3 min more. Pour half the sauce over. Cook 1 more min.','Serve over rice. Drizzle remaining sauce. Fan avocado slices alongside. Top with sesame seeds and green onion.'],macros:{calories:650,protein:52,carbs:50,fat:28},estimatedCost:16,bloodSugarNote:"Salmon omega-3s improve insulin sensitivity. Avocado fat buffers glycemic response. Have Greek yogurt on side if needed."},
'shrimp-fried-rice':{name:'Shrimp Fried Rice',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['1.5 lbs large shrimp, peeled and deveined (frozen, thawed overnight)','3 cups cooked brown rice, cooled or day-old','4 large eggs','1 cup frozen peas','1 cup carrots, diced small','4 cloves garlic, minced','3 tbsp soy sauce','2 tbsp sesame oil','1 tsp fresh ginger, grated','2 tbsp cooking oil, divided','3 green onions, green parts only, sliced','Salt to taste'],steps:['IMPORTANT: use day-old or spread freshly cooked rice on baking sheet and refrigerate 1 hour. Cold dry rice is essential.','Pat shrimp dry. Season lightly with salt.','Heat 1 tbsp oil in wok over HIGH until smoking. Cook shrimp 1–2 min per side. Remove.','Stir-fry carrots 3 min. Add peas, cook 1 min.','Push to edges. Add remaining oil to center. Scramble 4 eggs just until barely set.','Add cold rice, spread thin. Let sit 2 min to crisp. Toss everything.','Add garlic and ginger, toss 30 sec. Add soy sauce and sesame oil, toss 2 min.','Return shrimp. Toss to heat. Top with green onions.'],macros:{calories:580,protein:52,carbs:50,fat:18},estimatedCost:15,bloodSugarNote:'~52g protein. Add hard-boiled egg or cottage cheese on side to hit protein targets.'},
'lemon-garlic-shrimp-pasta':{name:'Lemon Garlic Shrimp Pasta',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['1.5 lbs large shrimp, peeled and deveined','12 oz linguine or spaghetti','6 cloves garlic, minced','¼ cup unsalted butter','2 tbsp olive oil','½ cup chicken broth','Juice of 2 lemons (about ¼ cup)','Zest of 1 lemon','½ cup freshly grated parmesan','2 tbsp fresh parsley, chopped','1 tsp salt','½ tsp black pepper'],steps:['Cook pasta in salted water to al dente. Reserve 1 cup pasta water. Drain.','Pat shrimp dry. Season with salt and pepper.','Heat oil over medium-high. Cook shrimp 1–2 min per side. Remove.','Reduce heat. Add butter, melt. Add garlic, cook 2 min stirring constantly.','Add broth, lemon juice, zest. Simmer 3 min.','Add pasta, toss. Add pasta water if too thick.','Return shrimp. Toss gently.','Off heat, stir in parmesan and parsley. Serve immediately.'],macros:{calories:620,protein:48,carbs:58,fat:20},estimatedCost:15,bloodSugarNote:'Al dente pasta has significantly lower GI. Shrimp protein and butter fat slow glucose absorption.'},
'tuna-noodle-skillet':{name:'Tuna Noodle Skillet',method:'stovetop',prepTime:5,cookTime:20,servings:4,ingredients:['3 cans (5 oz each) solid white albacore tuna in water, drained','8 oz egg noodles','2 cans (10.5 oz each) cream of mushroom soup','1 cup chicken broth','1 cup frozen peas','4 cloves garlic, minced','2 tbsp butter','½ cup sour cream','1 cup shredded cheddar','1 tsp garlic powder','½ tsp black pepper','Salt to taste','2 tbsp fresh parsley'],steps:['Cook egg noodles 2 min less than package. Reserve ½ cup pasta water. Drain.','Melt butter over medium. Add garlic, stir 60 sec.','Add soup and broth. Whisk smooth. Simmer.','Add sour cream, stir until smooth.','Add peas, cook 2 min.','Add noodles and tuna. Toss to coat. Add pasta water if too thick.','Season. Top with cheddar, cover 2 min to melt.','Garnish with parsley.'],macros:{calories:580,protein:45,carbs:42,fat:22},estimatedCost:10,bloodSugarNote:'Lower protein (~45g). Have a protein-rich snack on the side to hit daily goals.'},
'egg-turkey-sausage-scramble':{name:'Egg and Turkey Sausage Scramble',method:'stovetop',prepTime:10,cookTime:25,servings:4,ingredients:['12 large eggs','1 lb ground turkey breakfast sausage','1.5 lbs Yukon Gold potatoes, diced ½-inch','4 cloves garlic, minced','1 tsp smoked paprika','1 tsp garlic powder','1 tsp salt','½ tsp black pepper','1 tbsp butter','1 tbsp olive oil','1 cup shredded cheddar','2 tbsp fresh parsley or chives'],steps:['Steam potatoes with 1 cup water 8–10 min. Drain.','Crisp potatoes in olive oil 4–5 min per side. Season. Remove.','Cook sausage 6–8 min, breaking up. Add garlic, stir 60 sec. Remove.','Melt butter over MEDIUM-LOW. Whisk eggs with salt and pepper. Pour in.','Fold slowly every 15–20 sec. Remove while still slightly wet.','Fold in potatoes and sausage gently.','Top with cheddar, cover briefly to melt. Garnish.'],macros:{calories:640,protein:62,carbs:26,fat:36},estimatedCost:12,bloodSugarNote:'Eggs + sausage are zero-carb proteins with fat. Potatoes are the only significant carb. Most blood sugar stable breakfast-dinner on the list.'},
'pork-tenderloin-medallions':{name:'Pork Tenderloin Medallions with Pan Sauce',method:'stovetop',prepTime:10,cookTime:20,servings:4,ingredients:['1.5 lbs pork tenderloin, sliced into 1-inch medallions','1½ cups dry brown rice','3 cups fresh or frozen green beans, trimmed','4 cloves garlic, minced','2 tbsp butter, divided','1 tbsp olive oil','1 tsp Italian seasoning','1 tsp garlic powder','1 tsp salt','½ tsp black pepper','¼ cup chicken broth','1 tbsp Dijon mustard','1 tbsp honey','1 tsp fresh thyme (or ½ tsp dried)'],steps:['Cook rice.','Slice tenderloin into 1-inch medallions. Press each slightly flat. Season generously.','Heat oil and 1 tbsp butter over medium-high until foamy. Sear medallions 3–4 min per side until golden. Remove and tent with foil.','Add remaining butter. Add garlic, cook 60 sec.','Add broth, scrape bits. Add Dijon, honey, thyme. Simmer 2–3 min until coats a spoon.','Steam green beans: microwave with 2 tbsp water covered 3–4 min.','Plate medallions over rice. Spoon sauce over. Green beans alongside.'],macros:{calories:570,protein:55,carbs:50,fat:16},estimatedCost:13,bloodSugarNote:'Pork tenderloin is one of the leanest cuts. Honey-Dijon is only ¼ tbsp honey per serving. Green beans add fiber.'},
'baked-chicken-potatoes':{name:'Baked Chicken Thighs and Roasted Potatoes',method:'oven',prepTime:10,cookTime:45,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','2 lbs Yukon Gold potatoes, quartered','4 cloves garlic, minced','3 tbsp olive oil, divided','1 tsp smoked paprika, divided','1 tsp garlic powder, divided','1 tsp Italian seasoning','1 tsp salt, divided','½ tsp black pepper'],steps:['Preheat oven to 425°F. Line large sheet pan with foil.','Toss potatoes with 2 tbsp oil, half the spices. Spread on pan. Roast 15 min alone.','Mix remaining oil, garlic, remaining spices. Rub all over chicken.','Flip potatoes. Nestle chicken between potatoes.','Roast 25–30 min until chicken hits 165°F and is golden.','Rest 5 min before serving.'],macros:{calories:640,protein:68,carbs:35,fat:26},estimatedCost:12,bloodSugarNote:'High-heat roasting lowers potato GI vs boiling. Eat chicken first — protein before carbs helps.'},
'parmesan-crusted-chicken':{name:'Parmesan Crusted Chicken',method:'oven',prepTime:15,cookTime:30,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs, pounded to ¾-inch','1 cup panko breadcrumbs','1 cup freshly grated parmesan','1 tsp garlic powder','1 tsp Italian seasoning','½ tsp salt','½ tsp black pepper','2 large eggs, beaten','3 cups broccoli florets','2 tbsp olive oil','Cooking spray'],steps:['Preheat 425°F. Wire rack on foil-lined sheet pan. Spray well.','Pound chicken to even ¾-inch.','Mix panko, parmesan, garlic powder, Italian seasoning, salt, pepper.','Dip chicken in egg, press firmly into panko mixture both sides. Place on rack.','Toss broccoli with oil, salt, pepper on second pan.','Bake chicken 25–30 min until deep golden and 165°F. Do not open oven first 20 min.','Roast broccoli 15–18 min at same temp.'],macros:{calories:630,protein:77,carbs:18,fat:28},estimatedCost:14,bloodSugarNote:'Lowest-carb oven meal. Excellent blood sugar choice. Parmesan adds significant protein beyond the chicken.'},
'honey-garlic-baked-chicken':{name:'Honey Garlic Baked Chicken',method:'oven',prepTime:15,cookTime:45,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','1.5 lbs baby potatoes, halved','¼ cup honey','3 tbsp soy sauce','6 cloves garlic, minced','2 tbsp butter','1 tbsp rice vinegar','1 tbsp olive oil','1 tsp salt','½ tsp black pepper'],steps:['Preheat 400°F.','Make sauce: melt butter, add garlic 2 min, add honey/soy/vinegar, simmer 3 min. Divide.','Toss potatoes with oil, half the salt. Roast 15 min alone.','Season chicken. Push potatoes aside, add chicken. Pour ⅔ sauce over everything.','Bake 30–35 min. Baste at 15 min mark. Done at 165°F.','Drizzle reserved sauce before serving.'],macros:{calories:660,protein:68,carbs:50,fat:22},estimatedCost:12,bloodSugarNote:'Baby potatoes have lower GI than large. Honey is ~1 tbsp per serving — not a large sugar load with this much protein.'},
'sheet-pan-chicken-broccoli':{name:'Sheet Pan Chicken and Broccoli',method:'oven',prepTime:10,cookTime:35,servings:4,ingredients:['2.5 lbs boneless skinless chicken thighs','5 cups broccoli florets','4 cloves garlic, minced','3 tbsp olive oil','2 tbsp soy sauce','1 tbsp lemon juice','1 tsp smoked paprika','1 tsp garlic powder','1 tsp Italian seasoning','1 tsp salt','½ tsp black pepper','1½ cups dry brown rice','Freshly grated parmesan'],steps:['Cook rice.','Preheat 425°F. Line large sheet pan.','Whisk oil, soy sauce, lemon, garlic, spices.','Toss chicken in marinade. Toss broccoli with remaining marinade.','Arrange on sheet pan.','Roast 25–30 min until chicken is 165°F and broccoli has charred edges.','Serve over rice with parmesan.'],macros:{calories:620,protein:72,carbs:50,fat:18},estimatedCost:12,bloodSugarNote:'Broccoli is rich in chromium, which helps regulate blood sugar. High vegetable ratio. Reheats well.'},

// ── DATE UTILS ─────────────────────────────────────────────
function d0(d){const r=new Date(d);r.setHours(0,0,0,0);return r}
function sameDay(a,b){return d0(a).getTime()===d0(b).getTime()}
function isToday(d){return sameDay(d,new Date())}
function getMondayOf(d){
  const dt=d0(d),day=dt.getDay();
  dt.setDate(dt.getDate()-(day===0?6:day-1));
  return dt;
}
function fmtKey(d){const dt=d0(d);return`${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`}
function fmtShort(d,opts={}){return d0(d).toLocaleDateString('en-US',{month:'short',day:'numeric',...opts})}
function fmtMon(d){return d0(d).toLocaleDateString('en-US',{month:'short',year:'numeric'})}

// ── SCHEDULING ─────────────────────────────────────────────
function isBulkSunday(d){
  const diff=Math.round((d0(d)-d0(FIRST_BULK_SUNDAY))/86400000);
  return diff>=0&&diff%BULK_INTERVAL===0;
}
function getUpcomingBulkSundays(n=3){
  const today=d0(new Date()),first=d0(FIRST_BULK_SUNDAY),res=[];
  const elapsed=Math.max(0,Math.floor(Math.round((today-first)/86400000)/BULK_INTERVAL));
  let cur=new Date(first);cur.setDate(cur.getDate()+elapsed*BULK_INTERVAL);
  if(cur<today)cur.setDate(cur.getDate()+BULK_INTERVAL);
  while(res.length<n){res.push(d0(cur));cur.setDate(cur.getDate()+BULK_INTERVAL)}
  return res;
}
function getNextBulkSunday(){return getUpcomingBulkSundays(1)[0]}
function getEarliestAddDate(){const ns=getNextBulkSunday();ns.setDate(ns.getDate()+1);return ns}

const DAY_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
function getMealsForWeek(mon){
  const rot=getActiveRot(),allM=getAllMeals();
  const start=d0(ROTATION_START),ws=d0(mon);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d});
  // Step 1: base rotation
  let ids=days.map(d=>{
    const diff=Math.round((d0(d)-start)/86400000);
    return diff<0?null:rot[((diff%rot.length)+rot.length)%rot.length];
  });
  // Apply forced insertions
  const ins=lsGet(LS.ins,[]);
  days.forEach((d,i)=>{
    const key=fmtKey(d),hit=ins.find(x=>x.firstDate===key);
    if(hit)ids[i]=hit.id;
  });
  // Step 2: crockpot swap
  const crockWD=[],nonCrockWE=[];
  for(let i=0;i<5;i++)if(ids[i]&&allM[ids[i]]?.method==='crockpot')crockWD.push(i);
  for(let i=5;i<7;i++)if(ids[i]&&allM[ids[i]]?.method!=='crockpot')nonCrockWE.push(i);
  const swaps=Math.min(crockWD.length,nonCrockWE.length);
  for(let s=0;s<swaps;s++){[ids[crockWD[s]],ids[nonCrockWE[s]]]=[ids[nonCrockWE[s]],ids[crockWD[s]]]}
  // Step 3: remaining crockpot weekday → Saturday prep
  let preppedIdx=-1,prepForDay=null;
  for(let i=0;i<5;i++){
    if(ids[i]&&allM[ids[i]]?.method==='crockpot'){
      preppedIdx=i;prepForDay=DAY_NAMES[i];
      ids[5]=ids[i]; // Saturday shows the crockpot recipe
      break;
    }
  }
  // Step 4: 14-day no-repeat (skip the prepped weekday slot)
  for(let i=0;i<7;i++){
    if(!ids[i]||i===preppedIdx)continue;
    const used=new Set();
    for(let b=1;b<=13;b++){
      const prev=new Date(days[i]);prev.setDate(prev.getDate()-b);
      const diff=Math.round((d0(prev)-start)/86400000);
      if(diff>=0)used.add(rot[((diff%rot.length)+rot.length)%rot.length]);
    }
    if(used.has(ids[i])){const rep=rot.find(x=>!used.has(x));if(rep)ids[i]=rep}
  }
  return ids.map((id,i)=>({
    date:days[i],id,
    isPreppedWeekday:i===preppedIdx,
    isPrepDay:i===5&&preppedIdx>=0,
    prepForDay:i===5?prepForDay:null
  }));
}
function getMealForDate(d){
  const mon=getMondayOf(d),week=getMealsForWeek(mon);
  return week.find(w=>sameDay(w.date,d))||{date:d,id:null};
}

function catIngredient(s,storeType){
  const l=s.toLowerCase();
  const cats=storeType==='local'?LOCAL_CATS:SAMS_CATS;
  for(const [cat,kws] of Object.entries(cats)){
    if(cat==='Other')continue;
    if(kws.some(k=>l.includes(k)))return cat;
  }
  return'Other';
}
function normQty(s){
  return s.replace(/½/g,'.5').replace(/¼/g,'.25').replace(/¾/g,'.75')
    .replace(/⅓/g,'.333').replace(/⅔/g,'.667').replace(/⅛/g,'.125');
}
const UNIT_NORM={'lbs':'lbs','lb':'lbs','oz':'oz','tbsp':'tbsp','tsp':'tsp',
  'cups':'cup','cup':'cup','cans':'can','can':'can','cloves':'clove','clove':'clove',
  'bunches':'bunch','bunch':'bunch','stalks':'stalk','stalk':'stalk',
  'jars':'jar','jar':'jar','bags':'bag','bag':'bag','pkg':'pkg'};
function parseIng(raw){
  const s=normQty(raw.trim());
  const m=s.match(/^(\d*\.?\d+)?\s*(lbs?|oz|cups?|tbsp|tsp|cans?|cloves?|bunches?|stalks?|jars?|bags?|pkg)?\s+(.+)$/i);
  if(m){const u=(m[2]||'').toLowerCase();return{qty:parseFloat(m[1]||'1'),unit:UNIT_NORM[u]||u,name:m[3].trim()}}
  return{qty:1,unit:'',name:raw.trim()};
}
const NO_PLURAL=new Set(['tbsp','tsp','oz','lbs']);
function fmtUnit(unit,qty){
  if(!unit)return'';
  if(NO_PLURAL.has(unit))return unit;
  if(qty<=1)return unit;
  if(unit==='bunch')return'bunches';
  return unit+'s';
}
function normName(n){
  return n.toLowerCase()
    .replace(/\bboneless\s+skinless\b/g,'')
    .replace(/\b(?:fresh|frozen|dry|dried|minced|grated|roughly\s+chopped|chopped|sliced|diced|peeled|trimmed|shredded|crushed|cooked|thawed|day-old|long-grain)\b/g,'')
    .replace(/\b(?:93\/7|80\/20)\b/g,'')
    .replace(/\(.*?\)/g,'').replace(/,.*$/,'').replace(/\bor\b.*$/,'')
    .replace(/\s+/g,' ').trim();
}
function generateShoppingList(startDate,numDays,storeType){
  const allM=getAllMeals();
  const grouped={};
  for(let i=0;i<numDays;i++){
    const d=new Date(startDate);d.setDate(d.getDate()+i);
    const info=getMealForDate(d);
    if(!info?.id)continue;
    const meal=allM[info.id];if(!meal)continue;
    for(const ing of meal.ingredients){
      const local=isLocal(ing);
      if(storeType==='local'&&!local)continue;
      if(storeType==='sams'&&local)continue;
      const {qty,unit,name}=parseIng(ing);
      const key=normName(name);
      if(!grouped[key]){grouped[key]={display:name,qty:0,unit,count:0,meals:new Set()}}
      grouped[key].qty+=qty;grouped[key].count++;grouped[key].meals.add(meal.name);
      if(!grouped[key].unit&&unit)grouped[key].unit=unit;
    }
  }
  const cats={};
  for(const[key,item]of Object.entries(grouped)){
    const cat=catIngredient(item.display,storeType);
    if(!cats[cat])cats[cat]=[];
    const q=Math.round(item.qty*10)/10;
    const uStr=fmtUnit(item.unit,q);
    const qStr=item.unit?`${q} ${uStr}`:(q>1?`${Math.round(q)}`:'');
    cats[cat].push({key,display:qStr?`${qStr} ${item.display}`:item.display,mealCt:item.meals.size});
  }
  const ORDER=storeType==='local'?['Fresh Herbs','Citrus','Fresh Produce','Other']:
    ['Proteins','Dairy & Eggs','Grains & Pasta','Canned & Pantry','Produce','Other'];
  return ORDER.filter(c=>cats[c]?.length).map(c=>({cat:c,items:cats[c]}));
}

// ── CALENDAR ───────────────────────────────────────────────
let calStart=null; // first day of 7-card window
function initCalStart(){
  calStart=d0(new Date()); // today is card 1
}
function calNav(dir){
  calStart=new Date(calStart);calStart.setDate(calStart.getDate()+dir*7);
  renderCalendar();
}
function renderCalendar(){
  const cards=document.getElementById('cal-cards');
  const range=document.getElementById('cal-range');
  const today=d0(new Date());
  const days=Array.from({length:7},(_,i)=>{const d=new Date(calStart);d.setDate(d.getDate()+i);return d});
  // Range label
  const a=fmtShort(days[0]),b=fmtShort(days[6]);
  range.textContent=`${a} – ${b}`;
  // Build cards
  cards.innerHTML='';
  const ABBR=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  days.forEach((day,i)=>{
    const info=getMealForDate(day);
    const meal=info?.id?getAllMeals()[info.id]:null;
    const isYest=i===0;
    const isTod=sameDay(day,today);
    const isBulk=isBulkSunday(day);
    const isSun=day.getDay()===0;
    // Rice prep note: next day is shrimp-fried-rice?
    let showRicePrep=false;
    if(i<6){
      const nextInfo=getMealForDate(days[i+1]);
      if(nextInfo?.id==='shrimp-fried-rice')showRicePrep=true;
    }
    const method=meal?.method||'';
    const dotCls=method?`dot-${method}`:'dot-none';
    const card=document.createElement('div');
    card.className=`day-card${isTod?' is-today':''}${isYest?' is-yesterday':''}`;
    if(meal)card.onclick=()=>openRecipeModal(info.id);
    const badges=[];
    if(isBulk)badges.push('<span class="badge badge-sams">SAM\'S</span>');
    else if(isSun)badges.push('<span class="badge badge-shop">SHOP</span>');
    if(info?.isPrepDay)badges.push(`<span class="badge badge-prep">PREP &#8594; ${info.prepForDay}</span>`);
    if(info?.isPreppedWeekday)badges.push('<span class="badge badge-prepped">Prepped Sat</span>');
    if(showRicePrep)badges.push('<span class="badge badge-rice">Prep rice tonight</span>');
    const mealName=meal?meal.name:'—';
    let subtitle=meal?`${meal.method.charAt(0).toUpperCase()+meal.method.slice(1)} · ${meal.prepTime+meal.cookTime} min`:'';
    if(info?.isPreppedWeekday)subtitle='Prepped Saturday';
    card.innerHTML=`
      <div class="day-dot ${dotCls}"></div>
      <div class="day-date">
        <span class="day-abbr">${ABBR[day.getDay()]}</span>
        <span class="day-num">${day.getDate()}</span>
      </div>
      <div class="day-info">
        <div class="day-meal">${mealName}</div>
        ${subtitle?`<div class="day-sub">${subtitle}</div>`:''}
      </div>
      <div class="day-badges">${badges.join('')}</div>`;
    cards.appendChild(card);
  });
}

// ── MEALS LIST ─────────────────────────────────────────────
function renderMeals(){
  const list=document.getElementById('meals-list');
  list.innerHTML='';
  const rot=getRotation(),muted=getMutedSet(),allM=getAllMeals();
  rot.forEach((id,i)=>{
    const m=allM[id];if(!m)return;
    const isMuted=muted.has(id);
    const div=document.createElement('div');
    div.className=`meal-item${isMuted?' muted':''}`;
    div.dataset.id=id;
    div.innerHTML=`
      <span class="drag-handle">&#8801;</span>
      <span class="meal-num">${i+1}</span>
      <span class="mbadge mbadge-${m.method}">${m.method==='stovetop'?'Stove':m.method==='oven'?'Oven':'Crock'}</span>
      <div class="meal-info" onclick="openRecipeModal('${id}')">
        <div class="meal-name">${m.name}</div>
        <div class="meal-macros">${m.macros.calories} cal · ${m.macros.protein}g protein</div>
      </div>
      <div class="meal-acts">
        <button class="act-btn${isMuted?' muted-on':''}" title="${isMuted?'Unmute':'Mute'}" onclick="toggleMute('${id}')">&#9679;</button>
        <button class="act-btn del" title="Delete" onclick="deleteMeal('${id}')">&#10005;</button>
      </div>`;
    list.appendChild(div);
  });
  setupDragDrop();
}
function toggleMute(id){
  const m=lsGet(LS.muted,[]);
  const idx=m.indexOf(id);
  if(idx>=0)m.splice(idx,1);else m.push(id);
  lsSet(LS.muted,m);renderMeals();renderCalendar();
}
function deleteMeal(id){
  if(!confirm(`Remove "${getAllMeals()[id]?.name||id}" from rotation?`))return;
  const rot=getRotation().filter(x=>x!==id);
  lsSet(LS.rot,rot);
  const m=lsGet(LS.muted,[]).filter(x=>x!==id);lsSet(LS.muted,m);
  renderMeals();renderCalendar();
}

// ── DRAG & DROP ────────────────────────────────────────────
let dragSetupDone=false;
function setupDragDrop(){
  if(dragSetupDone)return;
  dragSetupDone=true;
  const list=document.getElementById('meals-list');
  let dragging=null,longPressTimer=null;
  const startDrag=(el)=>{
    dragging=el;
    dragging.classList.add('dragging');
  };
  list.addEventListener('touchstart',e=>{
    const handle=e.target.closest('.drag-handle');
    if(!handle)return;
    e.preventDefault();
    const item=handle.closest('.meal-item');
    longPressTimer=setTimeout(()=>startDrag(item),0);
  },{passive:false});
  list.addEventListener('touchmove',e=>{
    if(!dragging)return;
    e.preventDefault();
    const y=e.touches[0].clientY;
    const items=[...list.querySelectorAll('.meal-item:not(.dragging)')];
    let inserted=false;
    for(const item of items){
      const r=item.getBoundingClientRect();
      if(y<r.top+r.height/2){list.insertBefore(dragging,item);inserted=true;break}
    }
    if(!inserted&&items.length)list.appendChild(dragging);
  },{passive:false});
  const done=()=>{
    clearTimeout(longPressTimer);
    if(!dragging)return;
    dragging.classList.remove('dragging');dragging=null;
    const ids=[...list.querySelectorAll('.meal-item')].map(el=>el.dataset.id);
    lsSet(LS.rot,ids);
    list.querySelectorAll('.meal-num').forEach((el,i)=>el.textContent=i+1);
  };
  list.addEventListener('touchend',done);
  list.addEventListener('touchcancel',done);
}

// ── SHOPPING ───────────────────────────────────────────────
let shopPeriods=[],shopPeriodIdx=0,shopStore='local';
function getUpcomingShoppingSundays(n=5){
  const today=d0(new Date());
  const dow=today.getDay();
  const daysToSun=dow===0?0:7-dow;
  let cur=new Date(today);cur.setDate(cur.getDate()+daysToSun);
  const res=[];
  while(res.length<n){res.push(d0(cur));cur.setDate(cur.getDate()+7)}
  return res;
}
function initShoppingPeriods(){
  shopPeriods=getUpcomingShoppingSundays(5);
  // Default store: Sam's if first period is a bulk Sunday, otherwise local
  shopStore=isBulkSunday(shopPeriods[0])?'sams':'local';
}
function renderShopTabs(){
  const tabs=document.getElementById('shop-tabs');
  tabs.innerHTML=shopPeriods.map((s,i)=>{
    const bulk=isBulkSunday(s);
    return`<button class="pill-tab${i===shopPeriodIdx?' active':''}" onclick="setShopPeriod(${i})">
      ${fmtShort(s)}${bulk?' <span style="font-size:9px;opacity:.8">+SAM\'S</span>':''}
    </button>`;
  }).join('');
}
function renderShopToggle(){
  const bulk=isBulkSunday(shopPeriods[shopPeriodIdx]);
  // If this week isn't a bulk week, force local store
  if(!bulk)shopStore='local';
  const samsDim=!bulk;
  document.getElementById('shop-store-toggle').innerHTML=`
    <button class="store-btn${shopStore==='sams'?' active':''}"
      style="${samsDim?'opacity:.35;cursor:default':''}"
      onclick="${bulk?"setShopStore('sams')":''}">Sam's Club</button>
    <button class="store-btn${shopStore==='local'?' active':''}" onclick="setShopStore('local')">Local Store</button>`;
}
function setShopPeriod(i){shopPeriodIdx=i;renderShopTabs();renderShopToggle();renderShopItems()}
function setShopStore(s){shopStore=s;renderShopToggle();renderShopItems()}
function getShopKey(){
  const s=shopPeriods[shopPeriodIdx];
  return`${fmtKey(s)}_${shopStore}`;
}
function renderShopItems(){
  const period=shopPeriods[shopPeriodIdx];
  // Start date = Monday after the bulk Sunday
  const start=new Date(period);start.setDate(start.getDate()+1);
  const numDays=shopStore==='sams'?14:7;
  const groups=generateShoppingList(start,numDays,shopStore);
  const checked=lsGet(LS.shop,{});
  const key=getShopKey();
  const checkedForPeriod=checked[key]||{};
  const container=document.getElementById('shop-items');
  if(!groups.length){container.innerHTML='<p style="color:var(--t3);padding:20px 0;text-align:center">No meals scheduled for this period.</p>';return}
  container.innerHTML=groups.map(g=>`
    <div class="shop-category">
      <div class="shop-cat-title">${g.cat}</div>
      ${g.items.map(item=>{
        const isChk=!!checkedForPeriod[item.key];
        return`<div class="shop-item${isChk?' checked':''}" data-key="${item.key.replace(/"/g,'&quot;')}" onclick="toggleShopItem('${item.key.replace(/'/g,"\\'")}')">
          <div class="shop-chk"></div>
          <span class="shop-item-text">${item.display}</span>
          ${item.mealCt>1?`<span class="shop-meal-ct">×${item.mealCt}</span>`:''}
        </div>`;
      }).join('')}
    </div>`).join('');
}
function toggleShopItem(key){
  const checked=lsGet(LS.shop,{});
  const pkey=getShopKey();
  if(!checked[pkey])checked[pkey]={};
  const wasChecked=!!checked[pkey][key];
  if(wasChecked)delete checked[pkey][key];
  else checked[pkey][key]=true;
  lsSet(LS.shop,checked);
  renderShopItems();
  if(!wasChecked){
    const items=document.querySelectorAll('.shop-item');
    items.forEach(el=>{
      if(el.dataset.key===key){
        el.classList.add('just-checked');
        setTimeout(()=>el.classList.remove('just-checked'),300);
      }
    });
  }
}
function resetShopList(){
  const checked=lsGet(LS.shop,{});
  delete checked[getShopKey()];
  lsSet(LS.shop,checked);
  renderShopItems();
}

function renderMiniCal(monthDate,earliest,picked){
  const yr=monthDate.getFullYear(),mo=monthDate.getMonth();
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  const startDow=(first.getDay()+6)%7; // 0=Mon
  const DOWS=['Mo','Tu','We','Th','Fr','Sa','Su'];
  let html=DOWS.map(d=>`<div class="mini-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++)html+=`<div class="mini-day empty"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(yr,mo,d);
    const disabled=d0(dt)<d0(earliest);
    const sel=picked&&sameDay(dt,picked);
    html+=`<div class="mini-day${disabled?' disabled':''}${sel?' selected':''}" ${disabled?'':` onclick="pickDate(${yr},${mo},${d})"`}>${d}</div>`;
  }
  return html;
}
function addCalNav(dir){
  addCalMonth=new Date(addCalMonth);addCalMonth.setMonth(addCalMonth.getMonth()+dir);
  renderAddModal();

function pickDate(y,m,d){
  const dt=new Date(y,m,d);

}
function addStep2(){
  if(!addPickedDate)return;
  addStep=2;renderAddModal();

function saveCustomRecipe(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Please enter a recipe name.');return}
  const id=`custom-${Date.now()}`;
  const recipe={
    name,
    method:document.getElementById('f-method').value,
    prepTime:parseInt(document.getElementById('f-prep').value)||15,
    cookTime:parseInt(document.getElementById('f-cook').value)||30,
    servings:4,
    ingredients:document.getElementById('f-ings').value.trim().split('\n').filter(Boolean),
    steps:document.getElementById('f-steps').value.trim().split('\n').filter(Boolean),
    macros:{
      calories:parseInt(document.getElementById('f-cal').value)||0,
      protein:parseInt(document.getElementById('f-prot').value)||0,
      carbs:parseInt(document.getElementById('f-carbs').value)||0,
      fat:parseInt(document.getElementById('f-fat').value)||0
    },
    estimatedCost:0,
    bloodSugarNote:document.getElementById('f-bs').value.trim()
  };
  // Save custom meal
  const custom=lsGet(LS.custom,{});custom[id]=recipe;lsSet(LS.custom,custom);
  // Add to rotation
  const rot=getRotation();rot.push(id);lsSet(LS.rot,rot);
  // Add insertion
  const ins=lsGet(LS.ins,[]);ins.push({id,firstDate:fmtKey(addPickedDate)});lsSet(LS.ins,ins);
  closeModal('modal-add');
  renderMeals();renderCalendar();
}

let pendingImport=null;
function importRecipeJSON(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const recipes=(Array.isArray(data)?data:[data]).filter(r=>r.name&&r.ingredients&&r.steps);
      if(!recipes.length){alert('No valid recipes found in JSON.');return;}
      pendingImport=recipes;
      input.value='';
      addStep=1;addPickedDate=null;
      addCalMonth=new Date();addCalMonth.setDate(1);
      renderImportModal();
      openModal('modal-add');
    }catch{alert('Invalid JSON file.');}
  };
  reader.readAsText(file);
}
function renderImportModal(){
  const body=document.getElementById('modal-add-body');
  const earliest=getEarliestAddDate();
  const names=pendingImport.map(r=>r.name).join(', ');
  body.innerHTML=`
    <h2 class="rm-title">Import Recipe</h2>
    <p class="step-hint" style="margin-bottom:10px;color:var(--t2)">${names}</p>
    <p class="step-hint">Pick a start date or skip to add to end of rotation</p>
    <div class="mini-cal">
      <div class="mini-cal-hdr">
        <button class="mini-nav" onclick="importCalNav(-1)">&#8249;</button>
        <span class="mini-cal-title">${fmtMon(addCalMonth)}</span>
        <button class="mini-nav" onclick="importCalNav(1)">&#8250;</button>
      </div>
      <div class="mini-grid">${renderMiniCalImport(addCalMonth,earliest,addPickedDate)}</div>
    </div>
    <button class="save-btn" onclick="confirmImport()" ${addPickedDate?'':'disabled'} style="margin-bottom:10px;margin-top:14px">Import for ${addPickedDate?fmtShort(addPickedDate):'...'}</button>
    <button class="save-btn" onclick="confirmImport(true)" style="background:var(--s3);color:var(--t2)">Skip — Add to End of Rotation</button>`;
}
function renderMiniCalImport(monthDate,earliest,picked){
  const yr=monthDate.getFullYear(),mo=monthDate.getMonth();
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  const startDow=(first.getDay()+6)%7;
  const DOWS=['Mo','Tu','We','Th','Fr','Sa','Su'];
  let html=DOWS.map(d=>`<div class="mini-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++)html+=`<div class="mini-day empty"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(yr,mo,d);
    const disabled=d0(dt)<d0(earliest);
    const sel=picked&&sameDay(dt,picked);
    html+=`<div class="mini-day${disabled?' disabled':''}${sel?' selected':''}" ${disabled?'':` onclick="pickDateImport(${yr},${mo},${d})"`}>${d}</div>`;
  }
  return html;
}
function pickDateImport(y,m,d){addPickedDate=new Date(y,m,d);renderImportModal();}
function importCalNav(dir){addCalMonth=new Date(addCalMonth);addCalMonth.setMonth(addCalMonth.getMonth()+dir);renderImportModal();}
function confirmImport(skip=false){
  if(!pendingImport)return;
  let added=0;
  pendingImport.forEach(r=>{
    const id=r.id||`custom-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
    const recipe={
      name:r.name,method:r.method||'stovetop',
      prepTime:r.prepTime||15,cookTime:r.cookTime||30,servings:r.servings||4,
      ingredients:r.ingredients,steps:r.steps,
      macros:r.macros||{calories:0,protein:0,carbs:0,fat:0},
      estimatedCost:r.estimatedCost||0,bloodSugarNote:r.bloodSugarNote||''
    };
    const custom=lsGet(LS.custom,{});custom[id]=recipe;lsSet(LS.custom,custom);
    const rot=getRotation();rot.push(id);lsSet(LS.rot,rot);
    if(!skip&&addPickedDate){
      const ins=lsGet(LS.ins,[]);ins.push({id,firstDate:fmtKey(addPickedDate)});lsSet(LS.ins,ins);
    }
    added++;
  });
  pendingImport=null;
  closeModal('modal-add');
  renderMeals();renderCalendar();
  alert(`${added} recipe${added!==1?'s':''} imported!`);
}

// ── MODALS ─────────────────────────────────────────────────
function openModal(id){
  const el=document.getElementById(id);
  el.classList.add('visible');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.classList.add('open');
    setupSwipeToDismiss(el);
  }));
}
function closeModal(id){
  const el=document.getElementById(id);
  el.classList.remove('open');
  setTimeout(()=>el.classList.remove('visible'),420);
}
function setupSwipeToDismiss(modal){
  const sheet=modal.querySelector('.modal-sheet');
  const handle=modal.querySelector('.modal-handle');
  const body=modal.querySelector('.modal-body');
  if(!sheet||!handle||sheet._swipeSetup)return;
  sheet._swipeSetup=true;

  let startY=0,lastY=0,lastT=0,vel=0,dragging=false;

  function startDrag(y){
    startY=lastY=y;
    lastT=Date.now();vel=0;dragging=true;
    sheet.style.transition='none';
  }

  // Always-on drag zone: the handle pill at the top (outside scroll container)
  handle.addEventListener('touchstart',e=>{
    e.preventDefault();
    startDrag(e.touches[0].clientY);
  },{passive:false});

  // Anywhere on the sheet when scrolled to top — same as every iOS sheet
  sheet.addEventListener('touchstart',e=>{
    if(dragging)return;
    // Only hijack if the scrollable body is at the very top
    if(body&&body.scrollTop>0)return;
    const y=e.touches[0].clientY;
    startDrag(y);
    // Don't preventDefault here — let it be passive so scroll still works normally
    // We'll cancel the scroll in touchmove if they actually drag down
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const now=Date.now(),y=e.touches[0].clientY;
    const dy=y-startY;
    // Only take over if dragging downward; otherwise release control so scroll works
    if(dy<=0){dragging=false;return;}
    e.preventDefault();
    const dt=now-lastT;
    if(dt>0)vel=(y-lastY)/dt;
    lastY=y;lastT=now;
    sheet.style.transform=`translateY(${Math.max(0,dy)}px)`;
  },{passive:false,capture:true});

  const finish=()=>{
    if(!dragging)return;
    dragging=false;
    const dy=lastY-startY;
    if(dy>110||vel>0.45){
      sheet.style.transition='transform 0.36s cubic-bezier(0.32,0.72,0,1)';
      sheet.style.transform='translateY(110%)';
      setTimeout(()=>{
        sheet.style.transform='';
        sheet.style.transition='';
        closeModal(modal.id);
      },360);
    } else {
      sheet.style.transition='transform 0.42s cubic-bezier(0.32,0.72,0,1)';
      sheet.style.transform='';
      setTimeout(()=>sheet.style.transition='',420);
    }
  };
  document.addEventListener('touchend',finish,{passive:true,capture:true});
  document.addEventListener('touchcancel',finish,{passive:true,capture:true});
}

// ── TABS ───────────────────────────────────────────────────
function showSection(secId){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(secId).classList.add('active');
  document.querySelector(`.tab[data-sec="${secId}"]`).classList.add('active');
  if(secId==='sec-shopping'){initShoppingPeriods();renderShopTabs();renderShopToggle();renderShopItems()}
  if(secId==='sec-calendar')renderCalendar();
  if(secId==='sec-meals')renderMeals();
}

// ── INIT ───────────────────────────────────────────────────
async function init(){
  initSupabase();
  await syncFromSupabase();
  initStorage();
  initCalStart();
  renderCalendar();
  renderMeals();
  initShoppingPeriods();
  renderShopTabs();
  renderShopToggle();
  renderShopItems();
  subscribeRealtime();
  const loader=document.getElementById('loader');
  loader.classList.add('fade-out');
  setTimeout(()=>loader.style.display='none',400);
}
document.addEventListener('DOMContentLoaded',init);
</script>
